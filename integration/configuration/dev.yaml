# ── Database ──────────────────────────────────────────────────────────────────
# DB file path = {directory}/{driver_id}-{filename}
database:
  directory: "./integration/volumes/"
  filename: "app.db"

# ── Telemetry ─────────────────────────────────────────────────────────────────
telemetry:
  enabled: true
  directory: "./integration/logs/telemetry"

# ── Server ────────────────────────────────────────────────────────────────────
server:
  api_url: "https://gw.66dev.xyz/v1"

# ── Environment ──────────────────────────────────────────────────────────────
environment: dev

# ── Log level ─────────────────────────────────────────────────────────────────
log_level: "info,runtime=debug,schema=warn,hyper=warn,h2=warn,reqwest=warn"

# ── Integration UI / logging ────────────────────────────────────────────────
integration:
  log_directory: "./integration/logs/"

# ── Driver (integration-specific) ────────────────────────────────────────────
driver:
  # Preferred device/driver ID (32-char lowercase hex).
  # null = use CLI override, developer_devices selection, or auto-discovery.
  id: null

  # Stable driver IDs used to simulate multiple local clients.
  developer_devices:
    - "00000000000000000000000000000001"
    - "00000000000000000000000000000002"
    - "00000000000000000000000000000003"
    - "0000000000000000000000000000000a" #recover user

  # Test password used for Register and Recover.
  password: "123456"
