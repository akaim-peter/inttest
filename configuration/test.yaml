# ── Database ──────────────────────────────────────────────────────────────────
database:
  directory: "./volumes/"
  filename: "app.db"

# ── Telemetry ─────────────────────────────────────────────────────────────────
telemetry:
  enabled: true
  directory: "./logs/telemetry"

# ── Server ────────────────────────────────────────────────────────────────────
server:
  api_url: "https://gw.66dev.xyz/v1"
  netseed_url: "https://netseed-api.66dev.xyz/v1"

# ── Environment ──────────────────────────────────────────────────────────────
environment: test

# ── Log level ─────────────────────────────────────────────────────────────────
log_level: "info,runtime=debug,schema=warn,hyper=warn,h2=warn,reqwest=warn"

# ── Integration UI / logging ────────────────────────────────────────────────
integration:
  log_directory: "./logs/"

# ── Driver (integration-specific) ────────────────────────────────────────────
driver:
  id: null
  developer_devices:
    - "00000000000000000000000000000001"
    - "00000000000000000000000000000002"
    - "00000000000000000000000000000003"
  password: "123456"
